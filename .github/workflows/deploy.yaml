name: Deploy Hugo site to GitHub Pages
on:
  push:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build builder image with Docker Compose
        run: |
          docker rmi personal_website_builder || true
          docker compose build --no-cache --pull hugo

      - name: Run Hugo build with proper baseURL
        run: |
          docker compose run --no-deps --name hugo_builder hugo \
            sh -c "cat hugo.yaml | grep -A 5 'Who I am' || echo 'NOT FOUND IN HUGO.YAML' && hugo --baseURL 'https://garrett-kirsch.ceo' --destination /home/personal_website/public"

      - name: Copy public/ from builder container
        run: |
          docker cp hugo_builder:/home/personal_website/public ./public
          docker rm -f hugo_builder

      - name: Debug - verify public output
        run: grep -r "in progress" ./public/ || echo "NOT FOUND IN PUBLIC"

      - name: Add .nojekyll
        run: touch ./public/.nojekyll

      - name: Add CNAME file
        run: echo "garrett-kirsch.ceo" > ./public/CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages